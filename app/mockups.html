<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>חלונות עבודה — ניהול כלים</title>
<style>
:root{--bg:#0f1620;--surface:#18222f;--surface2:#1f2c3c;--txt:#e7eef6;--mut:#9fb0c3;
 --brand:#3b82f6;--brand2:#1d4ed8;--ok:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--line:#2a3a4d;--r:16px}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Arial,sans-serif}
body{background:var(--bg);color:var(--txt)}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#162232,#101a26)}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-size:20px}
.topbar h1{font-size:17px}.who{font-size:12px;color:var(--mut)}
.badge{margin-inline-start:auto;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--line)}
.badge.admin{color:#fcd34d}.badge.manager{color:#7dd3fc}
.wrap{max-width:980px;margin:0 auto;padding:18px}
.tt{font-size:13px;color:var(--mut);margin:14px 4px 10px;font-weight:600}
.toolbar{display:flex;flex-wrap:wrap;gap:10px}
.btn{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 15px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn .i{font-size:16px}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.warn{color:#fcd34d}.btn.bad{color:#fca5a5}
.overlay{position:fixed;inset:0;background:rgba(5,9,14,.66);display:grid;place-items:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:20px;width:100%;max-width:620px;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden}
.modal h2{font-size:19px;padding:18px 22px 4px}
.modal .sub{font-size:12.5px;color:var(--mut);padding:0 22px 14px}
.modal .body{padding:0 22px 8px}
.modal .foot{display:flex;gap:10px;justify-content:flex-start;padding:16px 22px;border-top:1px solid var(--line);margin-top:10px}
.seg{display:flex;gap:8px;margin-bottom:12px}
.seg a{font-size:12.5px;border:1px solid var(--line);border-radius:999px;padding:7px 13px;background:var(--surface2);color:var(--mut)}
.seg a.on{background:var(--brand);color:#fff;border-color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:10px 10px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-size:12px;font-weight:600}
.pill{padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
.pill.expired{background:#2a1416;color:#fca5a5}.pill.due60{background:#2a2110;color:#fcd34d}
.id{font-family:Consolas,monospace;color:#9fb0c3;font-size:12px}
input,select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--txt);font-size:13.5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.note{font-size:12px;color:var(--mut);background:var(--surface2);border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:10px}
.chk{width:18px;height:18px;accent-color:var(--brand)}
.tag{font-size:11.5px;padding:3px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);color:var(--mut)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const q=new URLSearchParams(location.search);
const screen=q.get('screen')||'cal-request';
const isAdmin=screen==='user-mgmt';
const role=isAdmin?{cls:'admin',name:'מנהל תוכנה'}:{cls:'manager',name:'אחראי כלים'};

const TOOLBAR=`
<div class="tt">חלון עבודה — פעולות ${role.name}</div>
<div class="toolbar">
  <div class="btn"><span class="i">🖊️</span> חתום על העגלה</div>
  <div class="btn warn"><span class="i">🔧</span> בקש שליחה לכיול</div>
  <div class="btn bad"><span class="i">💥</span> הצהר כלי שבור</div>
  <div class="btn"><span class="i">📤</span> חוסר מאושר (שימוש חיצוני)</div>
  <div class="btn"><span class="i">🗓️</span> בדיקה רבעונית</div>
  <div class="btn"><span class="i">✏️</span> עריכת כלים ומיקומים</div>
  <div class="btn"><span class="i">🛒</span> בניית הזמנה מעגלה</div>
  <div class="btn"><span class="i">📄</span> ייצוא דוח</div>
  ${isAdmin?'<div class="btn"><span class="i">👥</span> ניהול משתמשים</div><div class="btn"><span class="i">🕘</span> גרסאות ואתחול</div><div class="btn"><span class="i">🔎</span> יומן ביקורת</div>':'<div class="btn"><span class="i">👥</span> הוספת משתמש</div>'}
</div>`;

const CAL=`
<div class="overlay"><div class="modal">
  <h2>🔧 בקשת שליחה לכיול — עגלה 1</h2>
  <div class="sub">כלים מכויילים שפג תוקפם או מתקרבים אליו (30 יום). בחר מה לשלוח.</div>
  <div class="body">
    <div class="seg"><a class="on">בחר הכל</a><a>רק שפג / קרוב</a></div>
    <table>
      <thead><tr><th></th><th>מזהה</th><th>תיאור</th><th>תאריך כיול</th><th>סטטוס</th></tr></thead>
      <tbody>
        <tr><td><input class="chk" type="checkbox" checked></td><td><span class="id">C01-A1-0001</span></td><td>מיקרומטר</td><td>2026-06-15</td><td><span class="pill expired">פג תוקף</span></td></tr>
        <tr><td><input class="chk" type="checkbox" checked></td><td><span class="id">C01-B1-0004</span></td><td>שעון מדידה</td><td>2026-07-02</td><td><span class="pill due60">מתקרב</span></td></tr>
        <tr><td><input class="chk" type="checkbox"></td><td><span class="id">C01-C1-0002</span></td><td>מד מומנט</td><td>2026-07-19</td><td><span class="pill due60">מתקרב</span></td></tr>
      </tbody>
    </table>
    <div class="note">לאחר שליחה: הבקשה ממתינה לאישור של מנהל התוכנה או אחראי אחר → הופכת ל“חוסר מאושר” → ניתן להוציא לכיול. אם מנהל/אחראי יוזם בעצמו — מאושר מיד.</div>
  </div>
  <div class="foot"><div class="btn primary">שלח בקשה לאישור</div><div class="btn">ביטול</div></div>
</div></div>`;

const USERS=`
<div class="overlay"><div class="modal">
  <h2>👥 ניהול משתמשים — מנהל תוכנה</h2>
  <div class="sub">הוספה ושיוך תפקידים. רק מנהל התוכנה מבצע מחיקה.</div>
  <div class="body">
    <div class="row"><input placeholder="אימייל להזמנה"><select><option>בעל עגלה</option><option>אחראי כלים</option></select></div>
    <div class="row"><select><option>עגלה 1</option><option>עגלה 2</option><option>— ללא —</option></select><div class="btn primary" style="justify-content:center">הוסף ושתף במייל</div></div>
    <table>
      <thead><tr><th>אימייל</th><th>תפקיד</th><th>עגלות</th><th>פעולה</th></tr></thead>
      <tbody>
        <tr><td>aseelhalaby646@gmail.com</td><td><span class="tag">מנהל תוכנה</span></td><td>הכל</td><td>—</td></tr>
        <tr><td>yossi@iai.co.il</td><td><span class="tag">אחראי כלים</span></td><td>הכל</td><td><span class="btn bad" style="padding:6px 11px">הסר</span></td></tr>
        <tr><td>dana@iai.co.il</td><td><span class="tag">בעל עגלה</span></td><td>עגלה 1 (ראשי)</td><td><span class="btn bad" style="padding:6px 11px">הסר</span></td></tr>
      </tbody>
    </table>
    <div class="note">מחיקה שמבצע אחראי כלים אינה מיידית — היא נשלחת לאישור ולביצוע של מנהל התוכנה.</div>
  </div>
  <div class="foot"><div class="btn">סגור</div></div>
</div></div>`;

document.getElementById('root').innerHTML=`
<div class="topbar"><div class="logo">🧰</div><div><h1>ניהול כלים</h1><div class="who">חלון עבודה</div></div><span class="badge ${role.cls}">${role.name}</span></div>
<div class="wrap">${TOOLBAR}</div>
${isAdmin?USERS:CAL}`;
</script>
</body>
</html>
